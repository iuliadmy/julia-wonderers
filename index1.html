<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Travel Safety Printable - julia & the wonderers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #3AAFA9 0%, #2B8F89 60%, #1a6b66 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Floating small planes */
  .plane {
    position: fixed;
    opacity: 0.28;
    color: white;
    animation: floatplane 8s ease-in-out infinite;
    pointer-events: none;
    font-size: 28px;
    transition: transform 0.3s ease;
    will-change: transform;
  }
  .p1{top:8%;left:6%;animation-delay:0s;font-size:36px}
  .p2{top:20%;right:8%;animation-delay:2s;font-size:22px}
  .p3{bottom:28%;left:4%;animation-delay:4s;font-size:30px}
  .p4{bottom:12%;right:6%;animation-delay:1s;font-size:20px}
  .p5{top:45%;left:2%;animation-delay:3s;font-size:18px}
  .p6{top:60%;right:3%;animation-delay:5s;font-size:24px}
  @keyframes floatplane {
    0%,100%{transform:translateY(0) rotate(-10deg)}
    50%{transform:translateY(-18px) rotate(-10deg)}
  }

  /* Hero text container */
  .hero-text {
    position: relative;
    text-align: center;
    margin-bottom: 40px;
    z-index: 2;
  }

  /* BIG faint plane behind headline */
  .big-plane {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
    font-size: min(280px, 40vw);
    opacity: 0.16;
    color: white;
    pointer-events: none;
    z-index: 0;
    transition: transform 0.1s ease-out;
    white-space: nowrap;
  }

  .top-tag {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 50px;
    margin-bottom: 28px;
    display: inline-block;
    transition: transform 0.2s, background 0.2s;
    cursor: default;
  }
  .top-tag:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.28);
  }
  a.top-tag { text-decoration: none; font-weight: 800; letter-spacing: 3px; }

  h1 {
    position: relative;
    z-index: 2;
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 7vw, 72px);
    color: white;
    line-height: 1.12;
    margin-bottom: 16px;
    max-width: 740px;
    transition: transform 0.15s ease-out;
  }
  h1 em {
    font-style: normal;
    color: #FFD6E5;
    display: inline-block;
    transition: transform 0.2s;
  }
  h1 em:hover { transform: scale(1.05) rotate(-1deg); }

  .sub {
    position: relative;
    z-index: 2;
    color: rgba(255,255,255,0.85);
    font-size: 17px;
    max-width: 500px;
    line-height: 1.7;
    transition: transform 0.15s ease-out;
  }

  /* Badges */
  .badges {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    position: relative;
    z-index: 2;
  }
  .badge {
    background: rgba(255,255,255,0.18);
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.3);
    transition: transform 0.2s, background 0.2s;
    cursor: default;
  }
  .badge:hover {
    transform: translateY(-3px) scale(1.05);
    background: rgba(255,255,255,0.28);
  }

  /* Kit form wrapper */
  .kit-wrap {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 2;
    transition: transform 0.15s ease-out;
  }

  footer {
    margin-top: 32px;
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  footer strong { color: white; }

  /* Sparkle cursor trail */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 16px;
    animation: sparkle-fade 0.8s forwards;
  }
  @keyframes sparkle-fade {
    0%   { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.3) translateY(-20px); }
  }
</style>
</head>
<body>

<!-- Small floating planes -->
<span class="plane p1" data-speed="0.03">&#9992;</span>
<span class="plane p2" data-speed="0.05">&#9992;</span>
<span class="plane p3" data-speed="0.04">&#9992;</span>
<span class="plane p4" data-speed="0.02">&#9992;</span>
<span class="plane p5" data-speed="0.06">&#9992;</span>
<span class="plane p6" data-speed="0.03">&#9992;</span>

<a href="#kit-form" class="top-tag">&#9992; FREE DOWNLOAD</a>

<div class="hero-text" id="heroText">
  <!-- BIG faint plane -->
  <div class="big-plane" id="bigPlane">&#9992;</div>

  <h1 id="headline">Keep your little ones <em>safe</em><br>on every adventure</h1>
  <p class="sub" id="subtext" style="margin: 0 auto 0;">
    Travel safety printable for nomadic families &mdash; English &amp; Hungarian. 100% free.
  </p>
</div>

<div class="badges">
  <span class="badge">&#9986; Safety Card</span>
  <span class="badge">&#128205; AirTag Tips</span>
  <span class="badge">&#128203; Full Checklist</span>
  <span class="badge">&#127468;&#127463; EN + &#127469;&#127482; HU</span>
</div>

<div class="kit-wrap" id="kit-form">
  <script async data-uid="f1df9ec964" src="https://julia-the-wonderers.kit.com/f1df9ec964/index.js"></script>
</div>

<footer>Made with &#9829; by <strong>julia &amp; the wonderers</strong> &mdash; nomadic family life</footer>

<script>
  const headline = document.getElementById('headline');
  const subtext  = document.getElementById('subtext');
  const kitWrap  = document.getElementById('kitWrap');
  const bigPlane = document.getElementById('bigPlane');
  const planes   = document.querySelectorAll('.plane');

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let cx = window.innerWidth / 2;
  let cy = window.innerHeight / 2;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    // Sparkle trail
    if (Math.random() < 0.3) {
      const sparks = ['✨','⭐','🌟','✦','·'];
      const s = document.createElement('span');
      s.className = 'sparkle';
      s.textContent = sparks[Math.floor(Math.random() * sparks.length)];
      s.style.left = (e.clientX - 8) + 'px';
      s.style.top  = (e.clientY - 8) + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }
  });

  // Touch support
  document.addEventListener('touchmove', (e) => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
  }, { passive: true });

  function animate() {
    cx += (mouseX - cx) * 0.06;
    cy += (mouseY - cy) * 0.06;

    const dx = (cx - window.innerWidth  / 2) / window.innerWidth;
    const dy = (cy - window.innerHeight / 2) / window.innerHeight;

    // Headline parallax
    headline.style.transform = `translate(${dx * 18}px, ${dy * 10}px)`;
    subtext.style.transform  = `translate(${dx * 10}px, ${dy * 6}px)`;
    kitWrap.style.transform  = `translate(${dx * 6}px,  ${dy * 4}px)`;

    // Big plane rotates and moves
    bigPlane.style.transform = `translate(calc(-50% + ${dx * 40}px), calc(-50% + ${dy * 25}px)) rotate(${-15 + dx * 8}deg)`;

    // Small planes each have their own speed
    planes.forEach((p, i) => {
      const speed = 0.02 + i * 0.01;
      p.style.marginLeft = (dx * speed * 120) + 'px';
      p.style.marginTop  = (dy * speed * 80)  + 'px';
    });

    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
